<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samirxx</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  text-align: center;
  color: white;
  overflow-x: hidden;
}

/* FONDO PARTÍCULAS */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(red 2px, transparent 2px);
  background-size: 40px 40px;
  animation: animar 8s linear infinite;
  opacity: 0.4;
}

@keyframes animar {
  from {transform: translateY(0);}
  to {transform: translateY(200px);}
}

/* IMÁGENES */
img {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 4px solid red;
  margin-top: 25px;
  box-shadow: 0 0 25px red, 0 0 50px red;
}

/* TEXTO */
h1 {
  color: red;
  text-shadow: 0 0 10px red, 0 0 20px red;
}

/* BOTONES */
.btn {
  display: block;
  background: linear-gradient(45deg, red, #ff3c3c);
  color: white;
  padding: 16px;
  margin: 12px auto;
  width: 85%;
  border-radius: 15px;
  text-decoration: none;
  box-shadow: 0 0 20px red;
  transition: 0.3s;
  font-weight: bold;
}

.btn:hover {
  transform: scale(1.07);
  box-shadow: 0 0 35px red, 0 0 60px red;
}

/* EFECTO LATIDO */
@keyframes latido {
  0% {transform: scale(1);}
  50% {transform: scale(1.05);}
  100% {transform: scale(1);}
}

.btn {
  animation: latido 2s infinite;
}

/* ESPACIO ENTRE SECCIONES */
.section {
  margin-bottom: 40px;
}
</style>

</head>

<body>

<div class="section">
  <img src="images/20260316210408.png">
  <h1>Samirxx</h1>

  <a class="btn" href="#">WhatsApp</a>
  <a class="btn" href="#">PROXY IPHONE</a>
  <a class="btn" href="#">AIM DRAG</a>
  <a class="btn" href="#">AIM BODY</a>
</div>

<div class="section">
  <img src="images/20260316210415.png">
  <h1>@47Renovado</h1>

  <a class="btn" href="#">WhatsApp</a>
  <a class="btn" href="#">AIMBOT CUELLO</a>
  <a class="btn" href="#">HOLOGRAMA</a>
  <a class="btn" href="#">BALAS MÁGICAS</a>
</div>

<p style="opacity:0.5;">© 2026 Samirxx ⚡</p>

</body>
</html>
