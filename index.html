<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#000;
color:white;
overflow-x:hidden;
transition:opacity .3s;
}

/* FONDO */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
pointer-events:none;
}

/* CONTENEDOR */
.container{
position:relative;
z-index:1;
width:85%;
max-width:220px;
margin:auto;
padding-top:40px;
text-align:center;
animation:fadeIn 1s ease;
}

/* AVATAR */
.avatar{
width:60px;
height:60px;
border-radius:50%;
border:2px solid red;
box-shadow:0 0 15px red;
animation:aura 2s infinite;
}

.avatar.small{
width:45px;
height:45px;
}

/* TEXTO */
h1,.user2{
font-size:14px;
color:#ff4444;
margin:5px 0;
}

/* BOTONES */
.link{
display:block;
padding:8px;
margin:5px 0;
border-radius:10px;
background:rgba(255,0,0,0.08);
border:1px solid red;
color:white;
font-size:11px;
transition:.25s;
position:relative;
overflow:hidden;
}

.link:active{
transform:scale(.9);
box-shadow:0 0 25px red;
}

/* SEGUNDO PERFIL */
.section.second{
margin-top:40px;
}

/* BOTÓN SIGUIENTE PRO */
.next-btn{
margin-top:25px;
font-weight:bold;
animation:pulseBtn 1.5s infinite;
}

/* FLECHA ANIMADA */
.next-btn::after{
content:"➤";
position:absolute;
right:10px;
animation:arrowMove 1s infinite;
}

/* FOOTER */
.footer{
font-size:9px;
margin-top:10px;
color:#666;
}

/* ANIMACIONES */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

@keyframes aura{
0%{box-shadow:0 0 5px red;}
50%{box-shadow:0 0 25px red;}
100%{box-shadow:0 0 5px red;}
}

@keyframes pulseBtn{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

@keyframes arrowMove{
0%{transform:translateX(0);}
50%{transform:translateX(5px);}
100%{transform:translateX(0);}
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container">

<!-- PERFIL 1 -->
<img src="images/20260316210408.png" class="avatar">
<h1>Samirxx</h1>

<div class="section">

<a class="link" href="https://wa.me/526151160719?text=AIM%20BODY" target="_blank">AIM BODY</a>
</div>

<!-- PERFIL 2 -->
<div class="section second">
<img src="images/20260316210415.png" class="avatar small">
<p class="user2">@47Renovado</p>

<a class="link" href="https://wa.me/573025434258?text=Hola" target="_blank">WhatsApp</a>
<a class="link" href="https://wa.me/573025434258?text=AIMBOT%20CUELLO" target="_blank">AIMBOT CUELLO</a>

<a class="link" href="https://wa.me/573025434258?text=BALAS%20MAGICAS" target="_blank">BALAS MÁGICAS</a>

<!-- BOTÓN SIGUIENTE -->
<a class="link next-btn" href="next.html" onclick="fadeOut(event)">Siguiente</a>
</div>

<div class="footer">© 2026 Samirxx ⚡</div>

</div>

<script>
/* TRANSICIÓN */
function fadeOut(e){
e.preventDefault();
document.body.style.opacity="0";
setTimeout(()=>{
window.location=e.target.href;
},300);
}

/* FONDO */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
dx:(Math.random()-0.5)*1,
dy:(Math.random()-0.5)*1
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

ctx.beginPath();
ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
ctx.fillStyle="red";
ctx.fill();

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
});

requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
