<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODIFICACIÓN XIT</title>

<style>

body{
margin:0;
font-family:Arial;
background:#05060a;
color:white;
overflow:hidden;
}

/* FONDO */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
pointer-events:none;
}

/* CONTENEDOR */
.container{
width:90%;
max-width:280px;
margin:auto;
text-align:center;
position:relative;
z-index:1;
padding-top:70px;
animation:fadeIn 1s ease;
}

/* 🔥 TITULO PRO */
.title{
font-size:17px;
color:#00bfff;
position:relative;
display:inline-block;
margin-bottom:30px;
animation:glow 2s infinite alternate;
}

/* LINEA SUPERIOR */
.title::before{
content:"";
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
width:0%;
height:2px;
background:#00bfff;
animation:lineTop 1s forwards;
}

/* LINEA INFERIOR */
.title::after{
content:"";
position:absolute;
bottom:-8px;
left:50%;
transform:translateX(-50%);
width:0%;
height:2px;
background:#00bfff;
animation:lineBottom 1s forwards;
}

/* EFECTO ESCANEO */
.scan{
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(0,191,255,0.6),transparent);
animation:scan 2s infinite;
}

/* BOTONES */
.link{
display:block;
width:100%;
padding:14px;
margin:12px 0;
border-radius:14px;
border:1px solid #00bfff;
background:rgba(0,191,255,0.05);
color:#00bfff;
font-size:13px;
cursor:pointer;
transition:.25s;
position:relative;
overflow:hidden;
}

/* EFECTO BRILLO BOTÓN */
.link::before{
content:"";
position:absolute;
left:-100%;
top:0;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
transition:.5s;
}

.link:hover::before{
left:100%;
}

/* ACTIVADO */
.link.active-btn{
background:#00ffcc;
color:black;
border-color:#00ffcc;
box-shadow:0 0 20px #00ffcc;
}

.link.active-btn::after{
content:" ✔";
}

/* TOQUE */
.link:active{
transform:scale(.90);
}

/* PAGINAS */
.page{display:none;}
.active{display:block; animation:fadeIn .4s;}

/* REGRESAR */
.back{
margin-top:20px;
font-size:12px;
color:#aaa;
background:none;
border:none;
cursor:pointer;
}

/* LOADER */
.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
color:#00bfff;
font-size:18px;
opacity:0;
pointer-events:none;
transition:.3s;
}

.loader.show{opacity:1;}

/* ANIMACIONES */
@keyframes glow{
from{text-shadow:0 0 5px #00bfff;}
to{text-shadow:0 0 25px #00bfff;}
}

@keyframes lineTop{
from{width:0;}
to{width:120%;}
}

@keyframes lineBottom{
from{width:0;}
to{width:120%;}
}

@keyframes scan{
0%{left:-100%;}
100%{left:100%;}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">

<div class="title">
MODIFICACIÓN XIT
<div class="scan"></div>
</div>

<button class="link" onclick="openPage('config')">⚙️ Configuración</button>
<button class="link" onclick="openPage('rendimiento')">🚀 Rendimiento</button>
<button class="link" onclick="openPage('ajustes')">🎯 Ajustes</button>
<button class="link" onclick="openPage('seguridad')">🔒 Seguridad</button>

<button class="link" onclick="abrirFF()">🔥 Abrir Free Fire</button>

</div>

<!-- CONFIG -->
<div id="config" class="page">
<div class="title">CONFIGURACIÓN<div class="scan"></div></div>

<button class="link" onclick="toggle(this)">FPS BOOST</button>
<button class="link" onclick="toggle(this)">Optimización EXTREMA</button>
<button class="link" onclick="toggle(this)">Modo PRO</button>

<button class="back" onclick="back()">⬅️ Regresar</button>
</div>

<!-- RENDIMIENTO -->
<div id="rendimiento" class="page">
<div class="title">RENDIMIENTO<div class="scan"></div></div>

<button class="link" onclick="toggle(this)">Mejorar FPS</button>
<button class="link" onclick="toggle(this)">Reducir LAG</button>
<button class="link" onclick="toggle(this)">Estabilidad</button>

<button class="back" onclick="back()">⬅️ Regresar</button>
</div>

<!-- AJUSTES -->
<div id="ajustes" class="page">
<div class="title">AJUSTES<div class="scan"></div></div>

<button class="link" onclick="toggle(this)">Sensibilidad PRO</button>
<button class="link" onclick="toggle(this)">HUD personalizado</button>
<button class="link" onclick="toggle(this)">Control avanzado</button>

<button class="back" onclick="back()">⬅️ Regresar</button>
</div>

<!-- SEGURIDAD -->
<div id="seguridad" class="page">
<div class="title">SEGURIDAD<div class="scan"></div></div>

<button class="link" onclick="toggle(this)">Anti-Ban</button>
<button class="link" onclick="toggle(this)">Modo seguro</button>
<button class="link" onclick="toggle(this)">Sistema oculto</button>

<button class="back" onclick="back()">⬅️ Regresar</button>
</div>

</div>

<div id="loader" class="loader">Abriendo juego...</div>

<script>

/* NAV */
function openPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function back(){openPage('home');}

/* ACTIVAR */
function toggle(btn){
btn.classList.toggle("active-btn");
}

/* FREE FIRE */
function abrirFF(){
const loader=document.getElementById("loader");
loader.classList.add("show");

setTimeout(()=>{window.location.href="freefire://";},500);
setTimeout(()=>{window.location.href="https://apps.apple.com/app/free-fire/id1300146617";},2000);
}

/* FONDO */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
dx:(Math.random()-0.5)*0.4,
dy:Math.random()*0.6
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle='rgba(0,191,255,0.5)';
ctx.fill();

if(p.y>canvas.height)p.y=0;
if(p.x>canvas.width)p.x=0;
});

requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
