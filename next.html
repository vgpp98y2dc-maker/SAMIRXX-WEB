<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODIFICACIÓN XIT</title>

<style>
body{
margin:0;
font-family:Arial;
background:#05060a;
color:white;
overflow-x:hidden;
transition:opacity .3s;
}

/* FONDO */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
pointer-events:none;
}

/* CONTENEDOR */
.container{
width:90%;
max-width:280px;
margin:auto;
text-align:center;
position:relative;
z-index:1;
padding-top:70px;
padding-bottom:120px;
animation:fadeIn 1s ease;
}

/* TITULO */
.title{
font-size:17px;
color:#00bfff;
position:relative;
display:inline-block;
margin-bottom:25px;
animation:glow 2s infinite alternate;
}

.title::before,
.title::after{
content:"";
position:absolute;
left:50%;
transform:translateX(-50%);
height:2px;
width:0%;
background:#00bfff;
animation:line 1s forwards;
}

.title::before{top:-10px;}
.title::after{bottom:-8px;}

.scan{
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(0,191,255,0.6),transparent);
animation:scan 2s infinite;
}

/* BOTONES */
.link{
display:block;
width:100%;
padding:14px;
margin:12px 0;
border-radius:14px;
border:1px solid #00bfff;
background:rgba(0,191,255,0.05);
color:#00bfff;
font-size:13px;
cursor:pointer;
transition:.25s;
}

.link:hover{box-shadow:0 0 15px #00bfff;}
.link:active{transform:scale(.92);}

.link.active-btn{
background:#00ffcc;
color:black;
border-color:#00ffcc;
box-shadow:0 0 20px #00ffcc;
}

/* BOTON REGRESAR INTERNO */
.back-local{
margin-top:20px;
padding:10px;
width:100%;
border-radius:12px;
border:1px solid #666;
background:rgba(255,255,255,0.05);
color:#ccc;
cursor:pointer;
font-size:12px;
transition:.25s;
}

.back-local:active{
transform:scale(.92);
background:#00bfff;
color:black;
}

/* BOTON GLOBAL */
.back-btn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:85%;
max-width:280px;
padding:14px;
border-radius:14px;
border:1px solid #00bfff;
background:rgba(0,191,255,0.08);
color:#00bfff;
font-size:13px;
cursor:pointer;
z-index:2;
transition:.3s;
}

.back-btn:active{
transform:translateX(-50%) scale(.92);
background:#00bfff;
color:black;
box-shadow:0 0 20px #00bfff;
}

/* PAGINAS */
.page{display:none;}
.active{display:block; animation:fadeIn .4s;}

/* LOADER */
.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
color:#00bfff;
font-size:18px;
opacity:0;
pointer-events:none;
transition:.3s;
}
.loader.show{opacity:1;}

/* ANIMACIONES */
@keyframes glow{
from{text-shadow:0 0 5px #00bfff;}
to{text-shadow:0 0 25px #00bfff;}
}

@keyframes line{
from{width:0;}
to{width:120%;}
}

@keyframes scan{
0%{left:-100%;}
100%{left:100%;}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
<div class="title">MODIFICACIÓN XIT<div class="scan"></div></div>

<button class="link" onclick="openPage('config')">⚙️ Configuración</button>
<button class="link" onclick="openPage('rendimiento')">🚀 Rendimiento</button>
<button class="link" onclick="openPage('ajustes')">🎯 Ajustes</button>
<button class="link" onclick="openPage('seguridad')">🔒 Seguridad</button>

<button class="link" onclick="abrirFF()">🔥 Abrir Free Fire</button>
</div>

<!-- CONFIG -->
<div id="config" class="page">
<div class="title">CONFIGURACIÓN<div class="scan"></div></div>

<button class="link" onclick="toggle(this)">FPS BOOST</button>
<button class="link" onclick="toggle(this)">Modo PRO</button>

<button class="back-local" onclick="openPage('home')">⬅️ Regresar</button>
</div>

<!-- RENDIMIENTO -->
<div id="rendimiento" class="page">
<div class="title">RENDIMIENTO<div class="scan"></div></div>

<button class="link" onclick="toggle(this)">Mejorar FPS</button>
<button class="link" onclick="toggle(this)">Reducir LAG</button>

<button class="back-local" onclick="openPage('home')">⬅️ Regresar</button>
</div>

<!-- AJUSTES -->
<div id="ajustes" class="page">
<div class="title">AJUSTES<div class="scan"></div></div>

<button class="link" onclick="toggle(this)">Sensibilidad PRO</button>
<button class="link" onclick="toggle(this)">HUD PRO</button>

<button class="back-local" onclick="openPage('home')">⬅️ Regresar</button>
</div>

<!-- SEGURIDAD -->
<div id="seguridad" class="page">
<div class="title">SEGURIDAD<div class="scan"></div></div>

<button class="link" onclick="toggle(this)">Anti-Ban</button>
<button class="link" onclick="toggle(this)">Modo Seguro</button>

<button class="back-local" onclick="openPage('home')">⬅️ Regresar</button>
</div>

</div>

<!-- BOTON GLOBAL -->
<button class="back-btn" onclick="goBack()">⬅️ Regresar al inicio</button>

<div id="loader" class="loader">Abriendo juego...</div>

<script>

/* NAVEGACIÓN */
function openPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* BOTONES ACTIVOS */
function toggle(btn){
btn.classList.toggle("active-btn");
}

/* BOTON GLOBAL PRO */
function goBack(){
if(navigator.vibrate) navigator.vibrate(50);

document.body.style.opacity="0";

setTimeout(()=>{
window.location.href="index.html";
},300);
}

/* ABRIR FREE FIRE */
function abrirFF(){
const loader=document.getElementById("loader");
loader.classList.add("show");

setTimeout(()=>{window.location.href="freefire://";},500);
setTimeout(()=>{window.location.href="https://apps.apple.com/app/free-fire/id1300146617";},2000);
}

/* FONDO */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
dx:(Math.random()-0.5)*0.4,
dy:Math.random()*0.6
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle='rgba(0,191,255,0.5)';
ctx.fill();

if(p.y>canvas.height)p.y=0;
if(p.x>canvas.width)p.x=0;
});

requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
